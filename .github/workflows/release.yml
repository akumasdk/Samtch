name: Release APK

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0, v1.0.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode and setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > $GITHUB_WORKSPACE/release.jks
        chmod 600 $GITHUB_WORKSPACE/release.jks

    - name: Build Signed Release APKs
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        _JAVA_OPTIONS: -Xmx4g
      run: ./gradlew assembleRelease --stacktrace

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Prepare APKs for release
      id: apks
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        
        # Find and rename Full APK
        FULL_APK=$(find app/build/outputs/apk/full/release -name "*.apk" -type f | head -n 1)
        cp "$FULL_APK" "Samtch-$VERSION-full.apk"
        
        # Find and rename FOSS APK
        FOSS_APK=$(find app/build/outputs/apk/foss/release -name "*.apk" -type f | head -n 1)
        cp "$FOSS_APK" "Samtch-$VERSION-foss.apk"
        
        echo "full_path=Samtch-$VERSION-full.apk" >> $GITHUB_OUTPUT
        echo "foss_path=Samtch-$VERSION-foss.apk" >> $GITHUB_OUTPUT

    - name: Extract Changelog
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        sed -n "/## Samtch $VERSION/,/---/p" CHANGELOG.md | grep -v -- "---" > RELEASE_NOTES.md
        if [ ! -s RELEASE_NOTES.md ]; then
          echo "## Samtch $VERSION" > RELEASE_NOTES.md
          echo "See commit history for changes." >> RELEASE_NOTES.md
        fi
        echo -e "\n### Downloads\n- **Full**: Samtch-$VERSION-full.apk (Includes Auto-Updates)\n- **FOSS**: Samtch-$VERSION-foss.apk (For F-Droid compliance)" >> RELEASE_NOTES.md

    - name: Create Release and Upload APKs
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.apks.outputs.foss_path }}
          ${{ steps.apks.outputs.full_path }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body_path: RELEASE_NOTES.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


