name: Release APK

on:
  push:
    tags:
      - 'v*'  # Triggers on tags like v1.0, v1.0.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode and setup Keystore
      run: |
        echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > $GITHUB_WORKSPACE/release.jks
        chmod 600 $GITHUB_WORKSPACE/release.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Get version from tag
      id: version
      run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Get APK path
      id: apk
      run: |
        APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
        echo "path=$APK_PATH" >> $GITHUB_OUTPUT
        echo "Found APK at: $APK_PATH"

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ steps.apk.outputs.path }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Samtch ${{ steps.version.outputs.VERSION }}
          
          ### What's New
          - See commit history for changes
          
          ### Download
          Download the APK below to install on your Android device.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


